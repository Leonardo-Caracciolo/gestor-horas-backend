[pytest]
# ── Directorios ────────────────────────────────────────────
testpaths = tests
pythonpath = src
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Markers ────────────────────────────────────────────────
markers =
    unit: Tests unitarios (sin BD ni servicios externos)
    integration: Tests de integración (con BD en memoria)
    e2e: Tests end-to-end (con entorno de homologación)
    smoke: Suite de smoke tests (ejecutar antes de cada release)
    slow: Tests lentos (excluir con -m "not slow")

# ── Opciones por defecto ───────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=src/app
    --cov-report=term-missing
    --cov-report=html:results/coverage
    --cov-fail-under=80

# ── AsyncIO ────────────────────────────────────────────────
asyncio_mode = auto

# ── Warnings ───────────────────────────────────────────────
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
